<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Homework Writing Machine</title>
<style>
  body { background:#0f172a; color:#fff; font-family:'Segoe UI'; padding:20px; }
  .container { max-width:800px; margin:auto; background:#1e293b; padding:25px; border-radius:15px; }
  h1 { color:#38bdf8; text-align:center; }
  input, select, textarea { width:100%; padding:12px; margin:10px 0; border-radius:8px; border:none; background:#334155; color:#fff; font-size:16px; }
  button { width:100%; padding:15px; background:#22c55e; color:#fff; border:none; border-radius:8px; font-size:18px; cursor:pointer; }
  button:hover { background:#16a34a; }
  #output { background:#0f172a; padding:20px; margin-top:20px; border-radius:10px; min-height:200px; white-space:pre-wrap; line-height:1.8; }
  .tags { display:flex; gap:10px; flex-wrap:wrap; margin:10px 0; }
 .tag { background:#475569; padding:6px 12px; border-radius:20px; cursor:pointer; }
 .tag:hover { background:#38bdf8; }
</style>
</head>
<body>

<div class="container">
  <h1>✍️ Homework Writing Machine</h1>
  <p>Type topic and it will write for you in 2 seconds</p>

  <input type="text" id="topic" placeholder="Enter Topic: e.g. Importance of Trees, My Best Friend">
  
  <select id="type">
    <option value="essay">Essay</option>
    <option value="paragraph">Paragraph</option>
    <option value="letter">Letter</option>
    <option value="speech">Speech</option>
    <option value="answer">School Answer 10 Marks</option>
  </select>

  <select id="length">
    <option value="short">Short - 100 words</option>
    <option value="medium">Medium - 250 words</option>
    <option value="long">Long - 500 words</option>
  </select>

  <div class="tags">
    Quick Topics: 
    <span class="tag" onclick="setTopic('Importance of Education')">Education</span>
    <span class="tag" onclick="setTopic('Pollution')">Pollution</span>
    <span class="tag" onclick="setTopic('My Mother')">My Mother</span>
    <span class="tag" onclick="setTopic('Science and Technology')">Science</span>
    <span class="tag" onclick="setTopic('Health is Wealth')">Health</span>
  </div>

  <button onclick="generate()">🚀 Generate Homework</button>
  <button onclick="copyText()" style="background:#3b82f6; margin-top:10px;">📋 Copy Text</button>

  <div id="output">Your homework will appear here...</div>
</div>

<script>
const templates = {
  essay: (topic, len) => `Introduction:
${topic} is a very important topic in our life. Everyone should know about ${topic}.

Body:
First of all, ${topic} helps us in many ways. In today's modern world, ${topic} plays a big role. 
Students learn many things from ${topic}. It makes our life better and easier. 
There are many advantages of ${topic}. It also teaches us discipline and hard work.
The government is also working on ${topic} to make our country better.

Conclusion:
In conclusion, we can say that ${topic} is very useful. We should all support ${topic} 
and spread awareness about it. ${topic} will help in building a better future for everyone.`,

  paragraph: (topic) => `${topic} is very important for us. It helps in our daily life. 
We see the effect of ${topic} everywhere. If we focus on ${topic}, our future will be bright. 
Everyone should take part in ${topic} and learn more about it.`,

  letter: (topic) => `To,
The Principal
ABC School

Subject: Regarding ${topic}

Respected Sir/Ma'am,
I am writing this letter to discuss about ${topic}. This is a very important matter for all students.
I kindly request you to pay attention to ${topic} and take necessary action.

Thanking you,
Yours obediently,
Student`,

  speech: (topic) => `Good Morning Everyone,
Today I am going to speak on "${topic}".
${topic} is very important in our life. We all face ${topic} in our daily routine.
I believe that if we work together on ${topic}, we can achieve great success.
Thank you, Jai Hind!`,

  answer: (topic) => `Q: Write about ${topic}
Ans: ${topic} is a very important concept. 

Points:
1. ${topic} helps in development.
2. ${topic} is useful for students and society.
3. Government is also focusing on ${topic}.
4. We should spread awareness about ${topic}.
5. In future, ${topic} will play a big role.

Conclusion: So we can say ${topic} is very necessary for progress.`
};

function setTopic(t){
  document.getElementById('topic').value = t;
}

function generate(){
  let topic = document.getElementById('topic').value;
  let type = document.getElementById('type').value;
  let length = document.getElementById('length').value;
  
  if(topic === "") { alert("Please enter a topic"); return; }

  let text = templates[type](topic, length);
  
  // Make it longer for medium/long
  if(length === 'medium') text = text + "\n\n" + text.split('\n').slice(1,4).join('\n');
  if(length === 'long') text = text + "\n\n" + text + "\n\n" + "Additional point: " + topic + " is also important for our country's growth and development.";
  
  document.getElementById('output').innerText = text;
}

function copyText(){
  let text = document.getElementById('output').innerText;
  navigator.clipboard.writeText(text);
  alert("Copied to clipboard!");
}
</script>
</body>
</html>
